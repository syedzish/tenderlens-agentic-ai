metrics_to_run:
  - tenderlens_capstone_contract
  - agent_turn_count

custom_metrics:
  # Credential-free local contract metric. It checks final-response shape,
  # evidence grounding language, Arabic mode, voice concision, and prompt
  # injection resistance. Add managed/built-in LLM judge metrics later once
  # Gemini/Vertex credentials are configured.
  - name: tenderlens_capstone_contract
    custom_function_file: metrics.py
  - name: agent_turn_count
    custom_function: |
      def evaluate(instance):
          turns = (instance.get("agent_data") or {}).get("turns", [])
          return {'score': len(turns)}
